<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>◢◤ ACCESS DENIED — ryBlock</title>
<style>
  :root {
    --magenta: #ff1f8f;
    --cyan:    #16e0ff;
    --purple:  #b026ff;
    --orange:  #ff8a1e;
    --amber:   #ffd23f;
    --ink:     #12002b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background:
      radial-gradient(ellipse at 50% 38%, #3a0a63 0%, #1a0138 45%, #0a0018 100%);
    color: #fff;
    font-family: "Arial Black", "Helvetica Neue", Impact, system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* rotating sunburst rays behind everything */
  .rays {
    position: fixed; left: 50%; top: 34%;
    width: 200vmax; height: 200vmax;
    transform: translate(-50%, -50%);
    background: repeating-conic-gradient(
      from 0deg,
      rgba(255,138,30,0.16) 0deg 5deg,
      transparent 5deg 12deg);
    animation: spin 60s linear infinite;
    z-index: 0;
    pointer-events: none;
  }
  @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

  /* diagonal speed lines */
  .speed {
    position: fixed; inset: -20%;
    background: repeating-linear-gradient(115deg,
      transparent 0 22px,
      rgba(255,255,255,0.05) 22px 23px,
      transparent 23px 46px);
    animation: streak 0.9s linear infinite;
    z-index: 1; pointer-events: none;
  }
  @keyframes streak { to { transform: translateX(-46px); } }

  /* VHS scanlines + vignette flicker */
  body::before {
    content: ""; position: fixed; inset: 0; z-index: 6; pointer-events: none;
    background: repeating-linear-gradient(0deg,
      rgba(0,0,0,0.22) 0 1px, transparent 1px 3px);
  }
  body::after {
    content: ""; position: fixed; inset: 0; z-index: 7; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 52%, rgba(6,0,20,0.92) 100%);
    animation: flicker 5s infinite;
  }
  @keyframes flicker {
    0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:.7} 94%{opacity:1}
    97%{opacity:.85} 98%{opacity:1}
  }

  /* angular OVA panel */
  .frame {
    position: relative; z-index: 5;
    width: min(760px, calc(100% - 2.5rem));
    padding: 2.6rem 2.4rem 2.2rem;
    text-align: center;
    background: linear-gradient(160deg, rgba(30,2,60,0.82), rgba(12,0,30,0.9));
    border: 2px solid var(--magenta);
    box-shadow:
      0 0 0 4px rgba(18,0,43,0.9),
      0 0 34px rgba(255,31,143,0.55),
      inset 0 0 40px rgba(176,38,255,0.18);
    clip-path: polygon(
      0 14px, 14px 0, calc(100% - 14px) 0, 100% 14px,
      100% calc(100% - 14px), calc(100% - 14px) 100%, 14px 100%, 0 calc(100% - 14px));
  }
  .tag {
    position: absolute; top: 10px; right: 16px;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 0.62rem; letter-spacing: 0.28em; font-weight: 700;
    color: var(--amber); text-shadow: 0 0 8px rgba(255,210,63,0.7);
  }

  /* chrome bold-italic title */
  h1 {
    font-size: clamp(2.4rem, 8vw, 4.6rem);
    font-style: italic; font-weight: 900;
    letter-spacing: 0.02em; line-height: 0.95;
    background: linear-gradient(#ffffff 8%, #7fe9ff 34%, #16a6ff 50%,
                                #0b4a8f 51%, #6ecbff 68%, #ffffff 96%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
    -webkit-text-stroke: 2px #12002b;
    filter: drop-shadow(3px 3px 0 var(--magenta))
            drop-shadow(-2px -1px 0 var(--cyan));
    transform: skewX(-7deg);
    animation: jitter 3s infinite;
  }
  @keyframes jitter {
    0%,100%,40%,44%,80% { transform: skewX(-7deg) translate(0,0); }
    41% { transform: skewX(-7deg) translate(-4px,1px); }
    43% { transform: skewX(-7deg) translate(3px,-1px); }
    81% { transform: skewX(-7deg) translate(3px,0); }
    82% { transform: skewX(-7deg) translate(-2px,0); }
  }
  h2 {
    margin-top: 0.5rem;
    font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
    font-size: clamp(1rem, 3vw, 1.5rem); font-weight: 900;
    letter-spacing: 0.35em; color: var(--magenta);
    text-shadow: 0 0 12px rgba(255,31,143,0.9), 2px 2px 0 #12002b;
  }

  .divider {
    margin: 1.3rem auto 1.1rem; width: 74%; height: 3px;
    background: linear-gradient(90deg, transparent, var(--orange), var(--magenta), var(--cyan), transparent);
    box-shadow: 0 0 12px rgba(255,138,30,0.7);
  }
  .target {
    font-family: "SF Mono", Menlo, monospace;
    font-size: 1.02rem; letter-spacing: 0.06em; color: #eaf6ff; word-break: break-all;
  }
  .target b {
    font-style: normal; color: var(--amber);
    text-shadow: 0 0 10px rgba(255,210,63,0.8);
  }
  .target .lock { color: var(--magenta); text-shadow: 0 0 10px var(--magenta); }

  .log {
    margin: 1.3rem auto 0; display: inline-block; text-align: left;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 0.8rem; line-height: 1.75; color: rgba(180,240,255,0.85);
  }
  .log .p { color: var(--orange); }
  .log .cmd { color: #fff; background: rgba(255,31,143,0.18); padding: 0 .35em; }
  .cursor::after { content: "▮"; animation: blink 0.9s steps(1) infinite; color: var(--cyan); }
  @keyframes blink { 50% { opacity: 0; } }

  footer {
    margin-top: 1.6rem;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 0.66rem; letter-spacing: 0.32em; font-weight: 700;
    color: var(--cyan); text-shadow: 0 0 10px rgba(22,224,255,0.6);
  }
</style>
</head>
<body>
  <div class="rays"></div>
  <div class="speed"></div>

  <main class="frame">
    <span class="tag">SEC.7 // 東京湾岸グリッド</span>
    <h1>ACCESS DENIED</h1>
    <h2>アクセス禁止区域</h2>
    <div class="divider"></div>
    <p class="target">sector <b id="host">this sector</b> is <span class="lock">OFF LIMITS</span></p>
    <div class="log">
      <div><span class="p">&gt;</span> trace: request intercepted at 127.0.0.1</div>
      <div><span class="p">&gt;</span> authority: ryBlock // neo-tokyo grid control</div>
      <div><span class="p">&gt;</span> directive: go touch grass, netrunner</div>
      <div class="cursor"><span class="p">&gt;</span> unseal: <span class="cmd">rb:remove &lt;domain&gt;</span> </div>
    </div>
    <footer>◢◤ RYBLOCK ▮ 1 9 9 X ▮ WIRED NOT TIRED ◥◣</footer>
  </main>

  <script>
    var h = location.hostname;
    if (h && h !== "127.0.0.1" && h !== "localhost")
      document.getElementById("host").textContent = h;
  </script>
</body>
</html>
